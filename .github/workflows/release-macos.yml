name: Release (macOS, signed + notarized)

# Builds the self-contained bundle, signs it with your Developer ID, notarizes via
# notarytool, packages a signed .pkg, and attaches it to the GitHub Release.
#
# Trigger: push a v* tag, or run manually (workflow_dispatch).
#
# WHY a caveat: the Adobe Premiere/AE SDKs are NOT redistributable, so they can't
# live in this (public) repo or be fetched from Adobe in CI. Provide them one of:
#   (a) self-hosted macOS runner with the SDKs already on disk — set the
#       ADOBE_SDK_DIR variable, and change `runs-on` to your runner;
#   (b) a PRIVATE GitHub repo holding adobe-sdks.tar.gz as a release asset — set the
#       ADOBE_SDK_REPO + ADOBE_SDK_TAG variables and the ADOBE_SDK_PAT secret
#       (a fine-grained PAT with Contents:read on that repo); or
#   (c) any private direct-download URL — set the ADOBE_SDK_TARBALL_URL secret.
#
# Required repository secrets:
#   DEVELOPER_ID_APP_P12          base64 of your "Developer ID Application" .p12
#   DEVELOPER_ID_INSTALLER_P12    base64 of your "Developer ID Installer" .p12
#   DEVELOPER_ID_P12_PASSWORD     password for both .p12 files
#   KEYCHAIN_PASSWORD             any ephemeral password for the CI keychain
#   CODESIGN_ID                   e.g. "Developer ID Application: Name (TEAMID)"
#   INSTALLER_ID                  e.g. "Developer ID Installer: Name (TEAMID)"
#   NOTARY_APPLE_ID, NOTARY_TEAM_ID, NOTARY_PASSWORD  (app-specific password)
#   ADOBE_SDK_PAT                 (option b) PAT with Contents:read on the SDK repo
#   ADOBE_SDK_TARBALL_URL         (option c) URL to a private SDK tarball
# Variables: ADOBE_SDK_DIR (a), ADOBE_SDK_REPO + ADOBE_SDK_TAG (b).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest        # change to your self-hosted runner for option (a)
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        # coreutils provides gtimeout, used to bound each codesign --timestamp call.
        run: brew install eigen ceres-solver opencolorio opencv dylibbundler coreutils

      - name: Provide the Adobe SDKs (not redistributable)
        id: sdk
        run: |
          set -euo pipefail
          if [ -n "${ADOBE_SDK_DIR:-}" ]; then
            root="$ADOBE_SDK_DIR"                                           # option (a): self-hosted
          elif [ -n "${ADOBE_SDK_PAT:-}" ]; then                           # option (b): private repo asset
            : "${ADOBE_SDK_REPO:?set the ADOBE_SDK_REPO variable (e.g. owner/chromacal-sdks)}"
            : "${ADOBE_SDK_TAG:?set the ADOBE_SDK_TAG variable (e.g. v1)}"
            GH_TOKEN="$ADOBE_SDK_PAT" gh release download "$ADOBE_SDK_TAG" -R "$ADOBE_SDK_REPO" \
              --pattern 'adobe-sdks.tar.gz' --dir /tmp --clobber
            mkdir -p /tmp/adobe-sdks && tar -xzf /tmp/adobe-sdks.tar.gz -C /tmp/adobe-sdks
            root=/tmp/adobe-sdks
          elif [ -n "${ADOBE_SDK_TARBALL_URL:-}" ]; then                   # option (c): private URL
            curl -fsSL "$ADOBE_SDK_TARBALL_URL" -o /tmp/adobe-sdks.tar.gz
            mkdir -p /tmp/adobe-sdks && tar -xzf /tmp/adobe-sdks.tar.gz -C /tmp/adobe-sdks
            root=/tmp/adobe-sdks
          else
            echo "::error::No Adobe SDKs. Set ADOBE_SDK_DIR (a), ADOBE_SDK_PAT+ADOBE_SDK_REPO+ADOBE_SDK_TAG (b), or ADOBE_SDK_TARBALL_URL (c)."
            exit 1
          fi
          echo "PRSDK_DIR=$(/usr/bin/find "$root" -type d -path '*Premiere*Examples/Headers' | head -1)" >> "$GITHUB_ENV"
          echo "AESDK_DIR=$(/usr/bin/find "$root" -type d -path '*Examples/Headers' ! -path '*Premiere*' | head -1)" >> "$GITHUB_ENV"
        env:
          ADOBE_SDK_DIR: ${{ vars.ADOBE_SDK_DIR }}
          ADOBE_SDK_REPO: ${{ vars.ADOBE_SDK_REPO }}
          ADOBE_SDK_TAG: ${{ vars.ADOBE_SDK_TAG }}
          ADOBE_SDK_PAT: ${{ secrets.ADOBE_SDK_PAT }}
          ADOBE_SDK_TARBALL_URL: ${{ secrets.ADOBE_SDK_TARBALL_URL }}

      - name: Import signing certificates
        env:
          APP_P12: ${{ secrets.DEVELOPER_ID_APP_P12 }}
          INST_P12: ${{ secrets.DEVELOPER_ID_INSTALLER_P12 }}
          P12_PW: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
          KC_PW: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KC="$RUNNER_TEMP/chromacal.keychain-db"
          security create-keychain -p "$KC_PW" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "$KC_PW" "$KC"
          security default-keychain -s "$KC"
          security list-keychains -d user -s "$KC" login.keychain-db
          for var in APP_P12 INST_P12; do
            echo "${!var}" | base64 --decode > "$RUNNER_TEMP/$var.p12"
            security import "$RUNNER_TEMP/$var.p12" -k "$KC" -P "$P12_PW" \
              -T /usr/bin/codesign -T /usr/bin/productsign
          done
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KC_PW" "$KC" >/dev/null

      - name: Store notarytool credentials
        run: |
          xcrun notarytool store-credentials chromacal \
            --apple-id "${{ secrets.NOTARY_APPLE_ID }}" \
            --team-id "${{ secrets.NOTARY_TEAM_ID }}" \
            --password "${{ secrets.NOTARY_PASSWORD }}"

      - name: Build, sign, notarize, package
        env:
          CODESIGN_ID: ${{ secrets.CODESIGN_ID }}
          CHROMACAL_INSTALLER_ID: ${{ secrets.INSTALLER_ID }}
          NOTARY_PROFILE: chromacal
        run: plugin/effect/release.sh

      - name: Attach .pkg to the release
        uses: softprops/action-gh-release@v2
        with:
          files: chromacal-*.pkg
          generate_release_notes: true
